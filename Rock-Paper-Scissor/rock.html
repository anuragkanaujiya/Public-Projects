<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Rock.css">
</head>
<body>
    <div class="container">
        <div class="div1">
            <h1 class="heading">
                Rock Paper Scissor
            </h1>
        </div>
        <div class="div2">
            <div class="choice" id="rock">
                ROCK
            </div>
            <div class="choice" id="Paper">
                PAPER
            </div>
            <div class="choice" id="Scissor">
                SCISSOR
            </div>
        </div>
        <div class="div3">
            <div class="player">
                <h3 class="number1">0</h3>
                <h3 class="name1">You</h3>
            </div>
            <div class="computer">
                <h3 class="number2">
                    0
                </h3>
                <h3 class="name2">Computer</h3>
            </div>
        </div>
        <div class="div4">
            <h1 class="winner">
                Pick Your Move
            </h1>
        </div>
    </div>
    <button class="reset">Reset</button>
    <script src="rock.js"></script>
</body>
</html>
