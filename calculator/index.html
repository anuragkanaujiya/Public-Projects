<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0 , user-scaleable=no">
    <title>Calculator</title>
    <link rel="stylesheet" href="calc.css">
</head>

<body>
    <div class="main">
        <div class="div-nav">

        </div>
        <div class="main-content">
            <div class="content">
                <div class="main-c">
                    <div class="circle">

                    </div>
                    <div class="calculator">
                        <div class="upper-div">
                            <h3 class="h3-ques"></h3>
                            <input type="text" class="result" value=""> 
                        </div>
                        <div class="lower-div">
                            <button class="btn btn-1">Ac</button>
                            <button class="btn btn-2"><img src="backspace-icon.png" alt=""></button>
                            <button class="btn btn-3">/</button>
                            <button class="btn btn-4">*</button>
                            <button class="btn btn-5">7</button>
                            <button class="btn btn-6">8</button>
                            <button class="btn btn-7">9</button>
                            <button class="btn btn-8">-</button>
                            <button class="btn btn-9">4</button>
                            <button class="btn btn-10">5</button>
                            <button class="btn btn-11">6</button>
                            <div class="stack-btn">
                                <button class="btn btn-12">+</button>
                                <button class="btn btn-18">=</button>
                            </div>
                            <button class="btn btn-13">1</button>
                            <button class="btn btn-14">2</button>
                            <button class="btn btn-15">3</button>
                            <button class="btn btn-16">0</button>
                            <button class="btn btn-17">.</button>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="calc.js"></script>
</body>

</html>
